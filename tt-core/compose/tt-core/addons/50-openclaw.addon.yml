# OpenClaw Addon — TT-Production v14.0
# TT-Core Add-on: OpenClaw AI Agent  (profile: openclaw)
# Version: 1.2.0-production
# Stability policy: OpenClaw stays OPTIONAL and disabled by default.
# OpenClaw Addon — TT-Production v14.0
#
# WHAT IS OPENCLAW?
#   An autonomous AI agent that pairs "a brain that thinks" with "n8n that acts".
#   - Receives natural language via Telegram
#   - Treats every n8n webhook as a callable "Skill"
#   - Maintains persistent conversation memory
#   - Real-time Canvas dashboard showing its thought process
#
# MODEL BACKENDS (choose one in .env):
#   LOCAL  (default, free, private):
#     TT_OPENCLAW_MODEL=ollama/llama3.2   ← requires profile: ollama
#     TT_OPENCLAW_MODEL=ollama/llama3.1   ← or any model you've pulled
#   CLOUD (paid, requires API key):
#     TT_OPENCLAW_MODEL=google/gemini-2.5-flash
#     TT_OPENCLAW_GEMINI_KEY=<your_google_ai_studio_key>
#
# TWO MODES:
#   SETUP MODE (default, TT_OPENCLAW_MODE=setup):
#     Container stays idle. Run the onboarding wizard inside it.
#     Command: docker exec -it tt-core-openclaw openclaw onboard --install-daemon
#
#   PRODUCTION MODE (TT_OPENCLAW_MODE=production):
#     Container runs the gateway and serves the dashboard.
#     Switch ONLY after completing wizard + editing openclaw.json.
#
# FULL SETUP GUIDE: docs\OPENCLAW.md
#   Quick path:
#     1. Clone source:  git clone https://github.com/openclaw/openclaw.git compose\tt-core\openclaw_source
#     2. Run init:      scripts\Init-OpenClaw.ps1
#     3. Start addon:   scripts\Start-Service.ps1 -Service openclaw
#     4. Run wizard:    docker exec -it tt-core-openclaw openclaw onboard --install-daemon
#     5. Edit config:   compose\tt-core\volumes\openclaw\data\openclaw.json
#     6. Go live:       set TT_OPENCLAW_MODE=production in .env → restart service
#     7. Pair Telegram: scripts\Approve-Telegram.ps1 -AuthId <ID>
#
# DASHBOARD ACCESS:
#   http://127.0.0.1:${TT_OPENCLAW_HOST_PORT}/#token=<value_of_TT_OPENCLAW_TOKEN>
# OpenClaw Addon — TT-Production v14.0

services:

  openclaw:
    profiles: ["openclaw"]
    container_name: tt-core-openclaw
    build:
      # Build context = openclaw_source/ (must be cloned first — see docs\OPENCLAW.md)
      # Dockerfile is relative to the compose file directory (compose/tt-core/)
      context: ./openclaw_source
      dockerfile: ./Dockerfile.openclaw
      args:
        OPENCLAW_SOURCE_REF_LABEL: ${TT_OPENCLAW_SOURCE_REF:-__PIN_GIT_TAG_OR_COMMIT__}
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    environment:
      TZ:                     ${TT_TZ}
      NODE_ENV:               production
      HOST:                   0.0.0.0
      # Config paths inside container (bound to volumes below)
      OPENCLAW_CONFIG_PATH:   /home/node/.openclaw/openclaw.json
      OPENCLAW_STATE_DIR:     /home/node/.openclaw/state
      # Auth token for the dashboard (auto-generated by Init-TTCore.ps1)
      OPENCLAW_GATEWAY_TOKEN: ${TT_OPENCLAW_TOKEN}
      # ── Mode ─────────────────────────────────────────────────────────────
      # setup      → container idles, run wizard manually
      # production → gateway starts and serves dashboard + Telegram
      TT_OPENCLAW_MODE:       ${TT_OPENCLAW_MODE:-setup}
      # ── Model ────────────────────────────────────────────────────────────
      # Local Ollama (free, private):  ollama/llama3.2  (profile: ollama required)
      # Google Gemini (cloud, paid):   google/gemini-2.5-flash
      TT_OPENCLAW_MODEL:      ${TT_OPENCLAW_MODEL:-ollama/llama3.2}
      # Ollama base URL — uses TT-Core's Ollama container on internal network
      OLLAMA_HOST:            http://tt-core-ollama:11434
      # Google API key (leave empty when using Ollama)
      GOOGLE_API_KEY:         ${TT_OPENCLAW_GEMINI_KEY:-}
      # Telegram Bot Token (set after getting from @BotFather)
      TELEGRAM_BOT_TOKEN:     ${TT_OPENCLAW_TELEGRAM_TOKEN:-}
      # n8n webhook base URL — used by OpenClaw to invoke n8n workflows as Skills
      # This is the internal Docker network address (not localhost)
      N8N_INTERNAL_URL:       http://tt-core-n8n:5678
    ports:
      # Dashboard port — bound to 127.0.0.1 by default for security
      # Enable Tunnel exposure via TUNNEL_ROUTE_OPENCLAW=true
      - "${TT_BIND_IP}:${TT_OPENCLAW_HOST_PORT}:18789"
    volumes:
      # Persistent config, state, memory — survives restarts and image rebuilds
      - ./volumes/openclaw/data:/home/node/.openclaw
    networks:
      - tt_core_internal    # Access to Ollama, n8n, Postgres (for RAG workflows)
      - tt_shared_net       # Dashboard access from host browser
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      # In setup mode, container is always "healthy" (just idle)
      # In production mode, probe the gateway health endpoint
      test: >
        sh -c "
          if [ \"$${TT_OPENCLAW_MODE:-setup}\" = \"production\" ]; then
            wget -q -O- http://127.0.0.1:18789/health > /dev/null 2>&1 || exit 1;
          else
            exit 0;
          fi
        "
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 90s

networks:
  tt_core_internal:
    external: true
  tt_shared_net:
    external: true
