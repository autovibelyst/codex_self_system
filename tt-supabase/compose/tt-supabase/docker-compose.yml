networks:
  tt_supabase_internal:
    name: tt_supabase_internal
    internal: true
services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 256m
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
    - ../volumes/db:/var/lib/postgresql/data:Z
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  analytics:
    container_name: supabase-analytics
    image: supabase/logflare:1.31.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    depends_on:
      db:
        condition: service_healthy
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: ${POSTGRES_DB}
      DB_HOSTNAME: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_SINGLE_TENANT: 'true'
      LOGFLARE_SUPABASE_MODE: 'true'
      LOGFLARE_MIN_CLUSTER_SIZE: '1'
      LOGFLARE_LOG_LEVEL: warn
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
    healthcheck:
      test:
      - CMD
      - curl
      - -sSfL
      - -o
      - /dev/null
      - http://127.0.0.1:4000/health
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_SIGN_INS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}
      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_SIGNUP}
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM}
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:9999/health
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v14.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:3000/
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  realtime:
    container_name: supabase-realtime
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: 'false'
      DNS_NODES: ''''''
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:4000/
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    command:
    - /bin/sh
    - -c
    - /app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)'
      && /app/bin/server
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v1.37.8
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
      imgproxy:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: 'true'
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
    - ../volumes/storage:/var/lib/storage:z
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:5000/status
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  imgproxy:
    container_name: supabase-imgproxy
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    environment:
      IMGPROXY_BIND: :5001
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: 'true'
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
    volumes:
    - ../volumes/storage:/var/lib/storage:z,ro
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:5001/health
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  functions:
    container_name: supabase-edge-functions
    image: supabase/edge-runtime:v1.70.3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      VERIFY_JWT: ${FUNCTIONS_VERIFY_JWT}
    volumes:
    - ../volumes/functions:/home/deno/functions:z,ro
    command:
    - start
    - --main-service
    - /home/deno/functions/main
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:8081/health
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:8080/health
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  studio:
    container_name: supabase-studio
    image: supabase/studio:2026.02.16-sha-26c615c
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    depends_on:
      kong:
        condition: service_started
      meta:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: 'true'
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:3000/api/profile',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  vector:
    container_name: supabase-vector
    image: timberio/vector:0.53.0-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    depends_on:
      analytics:
        condition: service_healthy
    environment:
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
    volumes:
    - ../volumes/logs/vector.toml:/etc/vector/vector.toml:ro,z
    - /var/run/docker.sock:/var/run/docker.sock:ro,z
    command:
    - --config
    - /etc/vector/vector.toml
    - --watch-config
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://127.0.0.1:9001/health
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    depends_on:
      analytics:
        condition: service_healthy
    ports:
    - ${KONG_HTTP_HOST}:${KONG_HTTP_PORT}:8000/tcp
    - ${KONG_HTTPS_HOST}:${KONG_HTTPS_PORT}:8443/tcp
    volumes:
    - ../volumes/api/kong.yml:/home/kong/temp.yml:ro,z
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    entrypoint: bash -c 'eval "echo "$$(cat ~/temp.yml)"" > ~/kong.yml && /docker-entrypoint.sh
      kong docker-start'
    healthcheck:
      test:
      - CMD
      - kong
      - health
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
  supavisor:
    profiles:
    - optional
    container_name: supabase-pooler
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    ports:
    - ${POOLER_HOST}:${POOLER_PROXY_PORT_TRANSACTION}:6543
    volumes:
    - ../volumes/pooler/pooler.exs:/etc/pooler/pooler.exs:ro,z
    healthcheck:
      test:
      - CMD
      - curl
      - -sSfL
      - --head
      - -o
      - /dev/null
      - http://127.0.0.1:4000/api/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      PORT: 4000
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ecto://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/_supabase
      CLUSTER_POSTGRES: true
      SECRET_KEY_BASE: ${JWT_SECRET}
      VAULT_ENC_KEY: ${JWT_SECRET}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: default
      POOLER_DEFAULT_POOL_SIZE: 15
      POOLER_MAX_CLIENT_CONN: 200
      POOLER_POOL_MODE: transaction
      DB_POOL_SIZE: 10
    command:
    - /bin/sh
    - -c
    - /app/bin/migrate && /app/bin/supavisor eval "$$(cat /etc/pooler/pooler.exs)"
      && /app/bin/server
    networks:
    - tt_supabase_internal
    security_opt:
    - no-new-privileges:true
