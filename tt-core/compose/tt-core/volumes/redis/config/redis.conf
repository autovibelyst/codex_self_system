# redis.conf — TT-Core Redis configuration (v1.6)
# This file is mounted read-only into the Redis container.
# The requirepass directive is injected at runtime via the REDIS_PASSWORD
# environment variable — do NOT hardcode a password here.

# ── Memory management ─────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Persistence (AOF-only) ───────────────────────────────────────────────────
# AOF-only persistence: appendonly is set in docker-compose command.
# RDB snapshots are intentionally disabled (handled by --save "" in compose).

# ── Security ──────────────────────────────────────────────────────────────────
protected-mode yes
# Password is set via environment variable in docker-compose — see TT_REDIS_PASSWORD.
# Do not add a requirepass line here; it is managed by Init-TTCore.ps1.

# ── Network ───────────────────────────────────────────────────────────────────
# Bind to all interfaces inside the container (Docker network provides isolation).
bind 0.0.0.0

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Performance tuning ────────────────────────────────────────────────────────
tcp-keepalive 300
tcp-backlog 511
timeout 0
databases 16

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
