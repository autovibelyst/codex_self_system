# SOPS configuration for TT-Production v14.0
# Source package ships with placeholder only.
# installer/lib/sops-setup.sh injects operator key locally.
creation_rules:
  - path_regex: core\.secrets\.enc\.env$
    age: "<OPERATOR_AGE_PUBLIC_KEY>"
  - path_regex: tunnel\.secrets\.enc\.env$
    age: "<OPERATOR_AGE_PUBLIC_KEY>"

