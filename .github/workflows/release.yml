name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE" | head -50

          if ! command -v python3 >/dev/null 2>&1; then
            if command -v python >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v python)" "$HOME/.local/bin/python3"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              export PATH="$HOME/.local/bin:$PATH"
            else
              echo "::error::Neither python3 nor python is available on runner"
              exit 1
            fi
          fi

          command -v bash
          command -v python || true
          command -v python3
          python --version || true
          python3 --version
          test -f release/make-release.sh

      - name: Build release bundle
        run: |
          set -euo pipefail
          bash release/make-release.sh --root "$GITHUB_WORKSPACE" --out "$GITHUB_WORKSPACE/dist"

      - name: Read bundle metadata
        run: |
          BUNDLE_NAME="$(python3 -c 'import json; print(json.load(open("release/version.json", encoding="utf-8"))["bundle_name"])')"
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"

      - name: Validate source release
        shell: pwsh
        run: ./tt-core/release/validate-release.ps1

      - name: Validate exported bundle
        shell: pwsh
        run: ./release/validate-bundle.ps1 -Root "./dist/$env:BUNDLE_NAME"

      - name: Package zip and checksum
        run: |
          cd dist
          zip -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}"
          sha256sum "${BUNDLE_NAME}.zip" > "${BUNDLE_NAME}.zip.sha256"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.BUNDLE_NAME }}.zip
            dist/${{ env.BUNDLE_NAME }}.zip.sha256
